<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Complaint Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-wrapper">

    <div class="auth-card card">
        <div class="sidebar-header">
            <h2><i class="fas fa-shield-alt"></i> CMS</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Secure Login Access</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="alert-container">
              {% for category, message in messages %}
                <div class="alert {{ category }}">
                    <i class="fas fa-exclamation-circle"></i> {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                    <input type="email" name="email" id="email" class="form-control" placeholder="name@company.com" style="padding-left: 35px;" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" style="padding-left: 35px;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                Sign In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="/register" style="color: var(--primary-color); font-weight: 600;">Create Account</a>
            </p>
        </div>
    </div>

</body>
</html>
