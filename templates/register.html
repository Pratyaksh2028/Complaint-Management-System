<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | CMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-wrapper">

    <div class="auth-card card" style="max-width: 500px;">
        <div class="sidebar-header">
            <h2><i class="fas fa-user-plus"></i> Join CMS</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Create your account to start filing complaints.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="alert-container">
              {% for category, message in messages %}
                <div class="alert {{ category }}">
                    <i class="fas fa-info-circle"></i> {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                    <input type="text" name="fullname" id="fullname" class="form-control" placeholder="John Doe" style="padding-left: 35px;" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                    <input type="email" name="email" id="email" class="form-control" placeholder="john@example.com" style="padding-left: 35px;" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div style="position: relative;">
                        <i class="fas fa-phone" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                        <input type="text" name="phone" id="phone" class="form-control" placeholder="10-digit mobile" style="padding-left: 35px;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-key" style="position: absolute; left: 12px; top: 12px; color: var(--secondary-color);"></i>
                        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" style="padding-left: 35px;" required>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 15px;">
                Create My Account <i class="fas fa-check-circle" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="/login" style="color: var(--primary-color); font-weight: 600;">Sign In Instead</a>
            </p>
        </div>
    </div>

</body>
</html>
